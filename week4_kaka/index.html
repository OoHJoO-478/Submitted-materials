<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フロントエンド総合演習</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mainvisual">
        <img src="img/cake_store.jpg" alt="ケーキの画像">
    </div>
    <div class="text-area">
        <h1 id="title">Recipe Diary</h1>
        <p id="message">
            お菓子のレシピをまとめています。<br>
            ケーキだけでなく、洋菓子、和菓子もレシピを載せていくつまりです。<br>
            是非、楽しみにお待ちください！
        </p>
    </div>
    <ul id="photo-list">
        <li><img src="img/cake.jpg" alt="ケーキ"></li>
        <li><img src="img/choko_cake.jpg" alt="デザート"></li>
        <li><img src="img/makaron.jpg" alt="マカロン"></li>
    </ul>

   <div class="button-area">
    <div class="button-inner">
        <a href="#" id="button1">レシピ一覧を見る</a>
    </div>
   </div>

   <footer>
    <ul class="sns">
        <li><a href="#">Instagram</a></li>
        <li><a href="#">Twitter</a></li>
        <li><a href="#">Facebook</a></li>
    </ul>
    <p>© 2022 Cake Recipe Diary</p>
   </footer>

</html>
